<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PriceGuard | Price Tracker Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.4/chart.umd.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <span class="brand-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L4 5V11C4 16.5 7.4 21.2 12 22C16.6 21.2 20 16.5 20 11V5L12 2Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
            <path d="M8.5 12L11 14.5L16 9.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="brand-name">PriceGuard</span>
      </div>
      <p class="tagline">Multi-site price tracking &amp; instant drop alerts</p>
      <div class="stat-strip" id="statStrip">
        <div class="stat"><span class="stat-value" id="statCount">0</span><span class="stat-label">Tracked</span></div>
        <div class="stat"><span class="stat-value" id="statAlerts">0</span><span class="stat-label">Target set</span></div>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="add-product-card">
      <div class="card-heading">
        <h2>Track a new product</h2>
        <p class="card-subtitle">Paste a product link from Daraz, Amazon, or any supported store.</p>
      </div>
      <form id="addProductForm">
        <div class="field">
          <label for="url">Product URL</label>
          <input type="url" id="url" placeholder="https://www.daraz.pk/products/..." required />
        </div>
        <div class="field-row">
          <div class="field">
            <label for="targetPrice">Target Price (Rs.) — optional</label>
            <input type="number" id="targetPrice" placeholder="e.g. 25000" />
          </div>
          <div class="field">
            <label for="chatId">Telegram Chat ID — optional</label>
            <input type="text" id="chatId" placeholder="message the bot to get yours" />
          </div>
        </div>
        <button type="submit" id="submitBtn">+ Add Product</button>
      </form>
      <p id="formStatus" class="status-msg"></p>
    </section>

    <section>
      <div class="section-heading">
        <h2 class="section-title">Tracked products</h2>
        <span class="section-hint">Click a card to view its price history</span>
      </div>
      <div id="productGrid" class="product-grid">
        <p class="empty-state">No products tracked yet. Add one above to get started.</p>
      </div>
    </section>
  </main>

  <div id="chartModal" class="modal hidden">
    <div class="modal-content">
      <button class="close-btn" id="closeModal">&times;</button>
      <h3 id="chartTitle">Price History</h3>
      <canvas id="priceChart"></canvas>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
